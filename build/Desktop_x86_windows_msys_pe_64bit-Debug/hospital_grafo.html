<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Diagrama Hospital</title><script src='https://cdnjs.cloudflare.com/ajax/libs/viz.js/2.1.2/viz.js'></script><script src='https://cdnjs.cloudflare.com/ajax/libs/viz.js/2.1.2/full.render.js'></script><style>body { margin:0; background:#f4f7f6; display:flex; flex-direction:column; align-items:center; padding:20px; font-family:sans-serif; }h1 { color:#1A4731; }#graph svg { max-width:100%; height:auto; background:white; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.15); padding:10px; }</style></head><body><h1>Diagrama Graphviz — Hospital</h1><div id='graph'></div><script>var dotSrc = `digraph Hospital {
  rankdir=TB;
  node [shape=box, style=filled, fontname="Arial"];

  H [label="Hospital General", fillcolor="#1A4731", fontcolor=white, shape=ellipse];
  P [label="PACIENTES",    fillcolor="#2E7D52", fontcolor=white];
  M [label="MEDICOS",      fillcolor="#2E7D52", fontcolor=white];
  C [label="CITAS",        fillcolor="#2E7D52", fontcolor=white];
  D [label="DIAGNOSTICOS", fillcolor="#2E7D52", fontcolor=white];
  H -> P; H -> M; H -> C; H -> D;

  p0 [label="María García\nA+ | Hab. 302", fillcolor="#D4EDDA"];
  P -> p0;
  p1 [label="Carlos Mendoza\nO- | Hab. 410", fillcolor="#D4EDDA"];
  P -> p1;
  p2 [label="Sofía Ramírez\nB+ | Hab. 215", fillcolor="#D4EDDA"];
  P -> p2;
  p3 [label="Pedro Castillo\nAB- | Hab. 501", fillcolor="#D4EDDA"];
  P -> p3;

  m0 [label="Dr. Roberto Juárez\nMED-001 | CARDIOLOGIA", fillcolor="#D6EAF8"];
  M -> m0;
  m1 [label="Dra. Ana Solís\nMED-002 | NEUROLOGIA", fillcolor="#D6EAF8"];
  M -> m1;
  m2 [label="Dr. Luis Herrera\nMED-003 | PEDIATRIA", fillcolor="#D6EAF8"];
  M -> m2;
  m3 [label="Dra. Carmen Vega\nMED-004 | CIRUGIA", fillcolor="#D6EAF8"];
  M -> m3;

  C -> p0 [style=dotted, color="#E67E22"];
  p0 -> m0 [label="2025-04-10 09:00", color="#E67E22", style=dashed];
  C -> p1 [style=dotted, color="#E67E22"];
  p1 -> m1 [label="2025-04-10 11:30", color="#E67E22", style=dashed];
  C -> p2 [style=dotted, color="#E67E22"];
  p2 -> m2 [label="2025-04-11 08:00", color="#E67E22", style=dashed];
  C -> p3 [style=dotted, color="#E67E22"];
  p3 -> m0 [label="2025-04-10 09:00", color="#E67E22", style=dashed];
  C -> p1 [style=dotted, color="#E67E22"];
  p1 -> m3 [label="2025-04-12 14:30", color="#E67E22", style=dashed];

  d0 [label="Hipertensión Arterial\nLosartán 50mg / DIARIA", fillcolor="#FDEBD0"];
  D -> d0;
  d0 -> p0 [label="diagnostico activo", color="#C0392B"];
  d1 [label="Diabetes Tipo 2\nMetformina 850mg / CADA_12_HORAS", fillcolor="#FDEBD0"];
  D -> d1;
  d1 -> p1 [label="diagnostico activo", color="#C0392B"];
  d2 [label="Insuficiencia Cardiaca\nFurosemida 40mg / DIARIA", fillcolor="#FDEBD0"];
  D -> d2;
  d2 -> p3 [label="diagnostico activo", color="#C0392B"];
}
`;var viz = new Viz();viz.renderSVGElement(dotSrc).then(function(element){ document.getElementById('graph').appendChild(element); }).catch(function(error){ document.getElementById('graph').innerHTML = '<pre style="color:red">' + error + '</pre>'; });</script></body></html>
